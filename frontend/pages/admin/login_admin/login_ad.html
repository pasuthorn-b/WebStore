<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>เข้าสู่ระบบแอดมิน — MyShop</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../assets/css/style.css" />
  <style>
    body { display:flex; flex-direction:column; min-height:100vh }
    .wrap { flex:1; display:flex; align-items:center; justify-content:center; padding:24px 16px }
    .box  { background:#fff; border:1px solid #e5e7eb; border-radius:16px; padding:32px 28px;
            width:100%; max-width:380px; box-shadow:0 4px 24px rgba(0,0,0,0.06) }
    .inp  { border:1px solid #d1d5db; border-radius:8px; padding:9px 12px; width:100%;
            font-size:14px; font-family:inherit; outline:none; box-sizing:border-box }
    .inp:focus { border-color:#3b82f6 }
    .lbl  { font-size:13px; font-weight:600; margin-bottom:4px; display:block }
  </style>
</head>
<body>

  <nav class="navbar">
    <span class="navbar-logo" onclick="location.href='../Stores pages/index.html'">🛍️ MyShop</span>
    <div class="navbar-actions">
      <a href="../../Stores pages/index.html">
        <button class="btn btn-blue">← กลับร้านค้า</button>
      </a>
    </div>
  </nav>

  <div class="wrap">
    <div class="box">
      <div style="text-align:center;font-size:36px;margin-bottom:8px">🔐</div>
      <div style="text-align:center;font-weight:700;font-size:20px;margin-bottom:4px">เข้าสู่ระบบแอดมิน</div>
      <div style="text-align:center;font-size:13px;color:#888;margin-bottom:24px">เฉพาะผู้ดูแลระบบเท่านั้น</div>

      <div style="display:flex;flex-direction:column;gap:12px">
        <div>
          <label class="lbl" for="email">อีเมล</label>
          <input id="email" class="inp" type="email" placeholder="admin@shop.com" />
        </div>
        <div>
          <label class="lbl" for="password">รหัสผ่าน</label>
          <input id="password" class="inp" type="password" placeholder="รหัสผ่าน" />
        </div>

        <div id="err-msg" style="display:none;color:#ef4444;font-size:13px;
          background:#fee2e2;border-radius:8px;padding:8px 12px"></div>

        <button class="btn btn-blue" id="login-btn" onclick="handleLogin()"
          style="width:100%;padding:10px;margin-top:4px">
          เข้าสู่ระบบ
        </button>

        <div style="text-align:center;font-size:12px;color:#aaa">
          ไม่ใช่แอดมิน?
        <a href="../../login/index.html" style="color:#1d4ed8">เข้าสู่ระบบลูกค้า</a>
        </div>
      </div>
    </div>
  </div>
  <script src="../../../assets/js/mock-data.js"></script> 
  <script src="../../../assets/js/api.js"></script>
  <script src="../../../assets/js/admin-common.js"></script>
  <script src="login_ad.js"></script>
</body>
</html>
